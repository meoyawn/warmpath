version: 3

env:
  UV_CACHE_DIR: .uv-cache

tasks:
  typecheck:
    run: once
    desc: Type-check Python with Pyright.
    cmd: uv run python -m pyright warmpath

  test:
    run: once
    desc: Run Python unit and live integration tests.
    cmd: uv run pytest

  check:
    deps:
      - typecheck
      - test
